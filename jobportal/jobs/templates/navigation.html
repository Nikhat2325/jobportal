{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Job Portal</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <!-- Custom CSS -->
    <style>
        body {
            background-color: #f4f6f9;
        }

        /* Header */
        .header-text {
            font-size: 32px;
            font-weight: bold;
        }

        /* Navbar Gradient */
        .navbar {
            background: linear-gradient(45deg, #007bff, #00c6ff);
        }

        .navbar-nav .nav-link {
            color: white !important;
            margin-right: 10px;
            transition: 0.3s;
        }

        .navbar-nav .nav-link:hover {
            color: yellow !important;
            transform: scale(1.05);
        }

        /* Button Style */
        .btn-login {
            background-color: #28a745;
            border-radius: 20px;
            padding: 5px 15px;
        }

        .btn-login:hover {
            background-color: #218838;
        }

        /* Card Style */
        .main-card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }

        /* Social Icons */
        .social i {
            font-size: 18px;
            margin-left: 10px;
            color: #555;
            transition: 0.3s;
        }

        .social i:hover {
            color: #007bff;
            transform: scale(1.2);
        }
    </style>

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

<!-- HEADER -->
<div class="container mt-3">
    <div class="row align-items-center">

        <div class="col-sm-4">
            <img src="https://t3.ftcdn.net/jpg/02/97/84/46/360_F_297844639_oLXmSrzHmRSZIREF1VkJFUTOperoUTk8.jpg"
                 style="width:80px; height:80px; border-radius:50%;">
        </div>

        <div class="col-sm-4 text-center">
            <div class="header-text">
                <span style="color:#007bff;">Online Jobs</span><br>
                <span style="color:#28a745;">Portal System</span>
            </div>
        </div>

        <div class="col-sm-4 text-right social">
            <i class="fa fa-twitter"></i>
            <i class="fa fa-linkedin"></i>
            <i class="fa fa-instagram"></i>
            <i class="fa fa-telegram"></i>
        </div>

    </div>
</div>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark mt-3">
    <a class="navbar-brand font-weight-bold" href="#">JobPortal</a>

    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ml-auto">

            <li class="nav-item">
                <a class="nav-link" href="{% url 'index' %}"><i class="fa fa-home"></i> Home</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="{}"><i class="fa fa-briefcase"></i> Latest jobs Jobs</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="{}"><i class="fa fa-info-circle"></i> About</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="{}"><i class="fa fa-envelope"></i> Contact</a>
            </li>

            <li class="nav-item">
                <a class="nav-link btn btn-login text-white" href="{% url 'user_login' %}">
                    <i class="fa fa-user"></i> User Login
                </a>
            </li>
                <li class="nav-item">
                <a class="nav-link btn btn-login text-white" href="{% url 'recruiter_login' %}">
                    <i class="fa fa-user"></i>Recuriter Login
                </a>
            </li>
                <li class="nav-item">
                <a class="nav-link btn btn-login text-white" href="{% url 'admin_login' %}">
                    <i class="fa fa-user"></i>  Admin Login
                </a>
            </li>

        </ul>
    </div>
</nav>

<!-- CONTENT -->
<div class="container mt-4">
    
        {% block content %}
        {% endblock %}
    </div>
</div>

</body>
</html>
