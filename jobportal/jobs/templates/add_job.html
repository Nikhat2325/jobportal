{% load static %}
{% block body %}
{% include 'navigation.html' %}

<div class="container mt-4">
    <h3>Add Job</h3>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="title" placeholder="Job Title" class="form-control mb-2" required>
        <input type="text" name="company" placeholder="Company" class="form-control mb-2" required>
        <input type="text" name="location" placeholder="Location" class="form-control mb-2" required>

        <textarea name="description" placeholder="Description" class="form-control mb-2"></textarea>

        <button class="btn btn-success">Post Job</button>
    </form>
</div>

{% endblock %}
